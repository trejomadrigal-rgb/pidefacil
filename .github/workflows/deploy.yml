name: CI/CD — Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      job:
        description: 'Job a ejecutar manualmente'
        required: false
        default: 'setup-whatsapp'
        type: choice
        options:
          - setup-whatsapp
          - restart-evolution
          - seed-data
          - fix-admin-url
          - check-webhook-logs
          - diagnose-web

jobs:
  test:
    name: Integration Tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pidefacil_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Apply migrations on test DB
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/pidefacil_test
        run: npx prisma migrate deploy

      - name: Run API integration tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/pidefacil_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-minimum-32-characters-long-x
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-xx
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 30d
          NODE_ENV: test
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: pidefacil
        run: npx jest --testPathPattern=integration --testPathIgnorePatterns="files\\.integration" --runInBand --passWithNoTests

  deploy:
    name: Deploy to Coolify
    if: github.event_name == 'push'
    needs: test
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Deploy API
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"h81lvlzrwjd7jf8bp0tkg1wa","force":false}'

      - name: Set Web env vars (NEXT_PUBLIC_API_URL + Firebase)
        run: |
          # Use the stable public URL for both client and server-side fetches.
          # Firebase web config is public (embedded in browser bundle) — safe to inline.
          curl -sf -X PATCH 'http://localhost:8000/api/v1/applications/b10i6rz52rphphtcnxll73np/envs/bulk' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "data": [
                {"key": "NEXT_PUBLIC_API_URL", "value": "http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io", "is_preview": false},
                {"key": "API_URL", "value": "http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io", "is_preview": false},
                {"key": "NEXT_PUBLIC_FIREBASE_API_KEY", "value": "AIzaSyC_DQkm9B6oqFflcyAuNvYmXgw7H8bSqQA", "is_preview": false},
                {"key": "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN", "value": "pidefacil-76602.firebaseapp.com", "is_preview": false},
                {"key": "NEXT_PUBLIC_FIREBASE_DATABASE_URL", "value": "https://pidefacil-76602-default-rtdb.firebaseio.com", "is_preview": false},
                {"key": "NEXT_PUBLIC_FIREBASE_PROJECT_ID", "value": "pidefacil-76602", "is_preview": false},
                {"key": "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET", "value": "pidefacil-76602.firebasestorage.app", "is_preview": false},
                {"key": "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID", "value": "203313412606", "is_preview": false},
                {"key": "NEXT_PUBLIC_FIREBASE_APP_ID", "value": "1:203313412606:web:8bd0b2f8fac5323bf0e8af", "is_preview": false}
              ]
            }' && echo "✅ Web env vars updated"

      - name: Deploy Web
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"b10i6rz52rphphtcnxll73np","force":false}'

      - name: Set Admin env vars (NEXT_PUBLIC_API_URL)
        run: |
          curl -sf -X PATCH 'http://localhost:8000/api/v1/applications/vh3jq4ik26i989m3xmlkrz20/envs/bulk' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "data": [
                {"key": "NEXT_PUBLIC_API_URL", "value": "http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io", "is_preview": false}
              ]
            }' && echo "✅ Admin env vars updated"

      - name: Deploy Admin
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"vh3jq4ik26i989m3xmlkrz20","force":false}'

  fix-admin-url:
    name: Fix admin NEXT_PUBLIC_API_URL + redeploy
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'fix-admin-url'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Set NEXT_PUBLIC_API_URL in Coolify for admin
        run: |
          curl -sf -X PATCH 'http://localhost:8000/api/v1/applications/vh3jq4ik26i989m3xmlkrz20/envs/bulk' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "data": [
                {"key": "NEXT_PUBLIC_API_URL", "value": "http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io", "is_preview": false}
              ]
            }' && echo "✅ Env var set"

      - name: Redeploy Admin
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"vh3jq4ik26i989m3xmlkrz20","force":true}' \
            && echo "✅ Admin redeploy triggered"

  seed-data:
    name: Seed super admin + 3 fondas demo
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'seed-data'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Seed super admin via API container (docker exec)
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_KEY }}
          SEED_SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
          SEED_SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}
        run: |
          # Find the Coolify API container (by label or name pattern)
          API_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          if [ -z "$API_CONTAINER" ]; then
            API_CONTAINER=$(sudo docker ps --filter "name=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          fi
          if [ -z "$API_CONTAINER" ]; then
            echo "❌ API container not found"
            sudo docker ps --format "table {{.Names}}\t{{.Status}}"
            exit 1
          fi
          echo "API container: $(sudo docker inspect $API_CONTAINER --format '{{.Name}}')"

          SA_EMAIL="${SEED_SUPER_ADMIN_EMAIL:-superadmin@pidefacil.com}"
          SA_PASS="${SEED_SUPER_ADMIN_PASSWORD:-ChangeMe123!}"

          # Copy seed script from repo into container and execute
          sudo docker cp apps/api/prisma/seed-admin.cjs "${API_CONTAINER}:/tmp/seed-admin.cjs"
          sudo docker exec \
            -e SA_EMAIL="${SA_EMAIL}" \
            -e SA_PASS="${SA_PASS}" \
            "${API_CONTAINER}" \
            node /tmp/seed-admin.cjs
          echo "✅ Super admin seed OK → ${SA_EMAIL}"

      - name: Wait for API container to be healthy
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          echo "Waiting for API to be healthy (up to 8 min)..."
          for i in $(seq 1 96); do
            STATUS=$(curl -sf -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              "http://localhost:8000/api/v1/applications/h81lvlzrwjd7jf8bp0tkg1wa" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")
            if echo "$STATUS" | grep -q "running"; then
              echo "✅ Coolify reports API running after $((i * 5))s (status=$STATUS)"
              sleep 5
              break
            fi
            if [ $i -eq 96 ]; then
              echo "❌ API did not become healthy in 8 min (last status: $STATUS)"
              exit 1
            fi
            echo "  attempt $i/96, status=$STATUS..."
            sleep 5
          done

      - name: Seed 3 fondas demo (via API container, Node ESM)
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          API_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          if [ -z "$API_CONTAINER" ]; then
            API_CONTAINER=$(sudo docker ps --filter "name=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          fi
          sudo docker cp apps/api/prisma/seed-demo.mjs "${API_CONTAINER}:/tmp/seed-demo.mjs"
          sudo docker exec \
            -e API_URL='http://localhost:3000' \
            "${API_CONTAINER}" \
            node /tmp/seed-demo.mjs || {
            echo "❌ Seed failed — last 50 API container log lines:"
            sudo docker logs --tail=50 "${API_CONTAINER}"
            exit 1
          }
          echo "✅ Demo seed OK"

  setup-whatsapp:
    name: Setup Evolution API (WhatsApp)
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'setup-whatsapp' || github.event.inputs.job == '')
    runs-on: [self-hosted, linux, deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Start Evolution API
        env:
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          # Step 1: Get DATABASE_URL from Coolify to extract the internal PG hostname
          COOLIFY_RESPONSE=$(curl -sf 'http://localhost:8000/api/v1/applications/h81lvlzrwjd7jf8bp0tkg1wa/envs' \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" || echo "[]")
          echo "Coolify API response (first 300 chars): ${COOLIFY_RESPONSE:0:300}"

          DB_URL=$(echo "$COOLIFY_RESPONSE" | python3 -c "import sys,json; data=json.load(sys.stdin) if sys.stdin else []; items=data if isinstance(data,list) else data.get('data',[]); [print(e.get('value','')) for e in items if e.get('key')=='DATABASE_URL']" 2>/dev/null || true)
          echo "DB_URL from Coolify (first 60 chars): ${DB_URL:0:60}"

          DB_HOSTNAME=$(echo "$DB_URL" | python3 -c "import sys,re; m=re.search(r'@([^:/]+)', sys.stdin.read().strip()); print(m.group(1) if m else '')" 2>/dev/null || true)
          echo "PG hostname from Coolify URL: ${DB_HOSTNAME}"

          # Step 2: Find PG container — prefer hostname match from Coolify URL
          PG_CONTAINER=""
          if [ -n "${DB_HOSTNAME}" ]; then
            PG_CONTAINER=$(sudo docker ps -q | while read cid; do
              h=$(sudo docker inspect "$cid" --format '{{.Config.Hostname}}' 2>/dev/null)
              if [ "$h" = "$DB_HOSTNAME" ]; then
                sudo docker inspect "$cid" --format '{{.Name}}' | tr -d '/'
                break
              fi
            done)
          fi

          # Fallback: find PG container with POSTGRES_DB=pidefacil in its env
          if [ -z "${PG_CONTAINER}" ]; then
            PG_CONTAINER=$(sudo docker ps -q | while read cid; do
              env=$(sudo docker inspect "$cid" --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null)
              if echo "$env" | grep -q 'POSTGRES_DB=pidefacil'; then
                sudo docker inspect "$cid" --format '{{.Name}}' | tr -d '/'
                break
              fi
            done)
          fi

          echo "PostgreSQL container: ${PG_CONTAINER}"

          if [ -z "${PG_CONTAINER}" ]; then
            echo "❌ Could not find pidefacil PostgreSQL container. Running containers:"
            sudo docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
            exit 1
          fi

          # Step 3: Get credentials from the container's environment
          PG_ENV=$(sudo docker inspect "${PG_CONTAINER}" --format '{{range .Config.Env}}{{println .}}{{end}}')
          PG_USER=$(echo "$PG_ENV" | grep -E '^POSTGRES_USER=' | cut -d= -f2-)
          PG_PASS=$(echo "$PG_ENV" | grep -E '^POSTGRES_PASSWORD=' | cut -d= -f2-)
          [ -z "$PG_USER" ] && PG_USER=$(echo "$PG_ENV" | grep -E '^POSTGRESQL_USERNAME=' | cut -d= -f2-)
          [ -z "$PG_PASS" ] && PG_PASS=$(echo "$PG_ENV" | grep -E '^POSTGRESQL_PASSWORD=' | cut -d= -f2-)
          PG_USER="${PG_USER:-postgres}"

          # Use Coolify hostname (the DNS name that resolves inside Coolify's network)
          # If Coolify hostname is unknown, fall back to the container's Config.Hostname
          if [ -n "${DB_HOSTNAME}" ]; then
            PG_HOST="${DB_HOSTNAME}"
          else
            PG_HOST=$(sudo docker inspect "${PG_CONTAINER}" --format '{{.Config.Hostname}}')
          fi

          # Prefer the non-bridge Coolify internal network
          PG_NETWORK=$(sudo docker inspect "${PG_CONTAINER}" \
            --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
            | tr ' ' '\n' | grep -v '^$' | grep -v '^bridge$' | head -1)
          [ -z "${PG_NETWORK}" ] && PG_NETWORK=$(sudo docker inspect "${PG_CONTAINER}" \
            --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
            | tr ' ' '\n' | grep -v '^$' | head -1)

          echo "PG host: ${PG_HOST}, network: ${PG_NETWORK}, user: ${PG_USER}"

          if [ -z "${PG_HOST}" ]; then
            echo "❌ Could not determine PostgreSQL hostname"
            exit 1
          fi

          # Step 4: Build Evolution API DB URL
          EVO_DB_URL="postgresql://${PG_USER}:${PG_PASS}@${PG_HOST}:5432/evolution_api"
          echo "EVO_DB_URL target: evolution_api on ${PG_HOST}"

          # Step 5: Drop + recreate evolution_api database (limpia tokens huérfanos)
          sudo docker exec "${PG_CONTAINER}" \
            psql -U "${PG_USER}" -c "DROP DATABASE IF EXISTS evolution_api;" 2>&1 || true
          sudo docker exec "${PG_CONTAINER}" \
            psql -U "${PG_USER}" -c "CREATE DATABASE evolution_api;" 2>&1 || true
          echo "--- evolution_api DB recreated ---"

          cd apps/api

          # Clean up previous evolution containers + volumes (token registry contaminado)
          printf "EVOLUTION_API_KEY=x\nDATABASE_CONNECTION_URI=x\n" > .env.whatsapp.tmp
          sudo docker compose -f docker-compose.whatsapp.yml --env-file .env.whatsapp.tmp down --volumes --remove-orphans 2>/dev/null || true
          rm -f .env.whatsapp.tmp
          sudo docker ps -a --filter "name=evolution" -q | xargs -r sudo docker rm -f 2>/dev/null || true
          sudo docker volume rm api_evolution_instances api_evolution_store 2>/dev/null || true
          echo "--- Containers + volumes cleaned ---"

          # v1.4.8 pinned — v2.x tiene Baileys roto (/instance/create devuelve 404)
          LATEST_TAG="v1.4.8"
          echo "Evolution API tag a usar: ${LATEST_TAG}"

          # Start Redis + Evolution API (bridge mode, port 18080→8080)
          printf "EVOLUTION_API_KEY=%s\nDATABASE_CONNECTION_URI=%s\nEVOLUTION_API_TAG=%s\n" \
            "${EVOLUTION_API_KEY}" "${EVO_DB_URL}" "${LATEST_TAG}" > .env.whatsapp
          sudo docker compose -f docker-compose.whatsapp.yml --env-file .env.whatsapp pull
          sudo docker compose -f docker-compose.whatsapp.yml --env-file .env.whatsapp up -d --wait --wait-timeout 60
          rm -f .env.whatsapp

          # Connect evolution-api to Coolify's internal network so it can resolve the PG hostname
          if [ -n "${PG_NETWORK}" ]; then
            sudo docker network connect "${PG_NETWORK}" api-evolution-api-1 2>/dev/null || true
            echo "Connected to Coolify network: ${PG_NETWORK}"
          fi

          # Ensure the compose network has internet access (masquerade for Docker bridge)
          # The compose network may not have NAT masquerade on this VPS — add it explicitly
          COMPOSE_NET_ID=$(sudo docker inspect api-evolution-api-1 \
            --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
            | tr ' ' '\n' | grep -v '^$' | grep -v "${PG_NETWORK}" | head -1)
          COMPOSE_SUBNET=$(sudo docker network inspect "${COMPOSE_NET_ID}" \
            --format '{{range .IPAM.Config}}{{.Subnet}}{{end}}' 2>/dev/null || true)
          echo "Compose network: ${COMPOSE_NET_ID}, subnet: ${COMPOSE_SUBNET}"
          if [ -n "${COMPOSE_SUBNET}" ]; then
            sudo iptables -t nat -I POSTROUTING 1 -s "${COMPOSE_SUBNET}" ! -d "${COMPOSE_SUBNET}" -j MASQUERADE 2>/dev/null || true
            echo "Added iptables masquerade for ${COMPOSE_SUBNET}"
          fi
          # Blanket Docker masquerade (covers 172.16–31, 192.168.x)
          sudo iptables -t nat -I POSTROUTING 1 -s 172.16.0.0/12 ! -d 172.16.0.0/12 -j MASQUERADE 2>/dev/null || true

          sudo docker restart api-evolution-api-1
          echo "Waiting for restart after network + iptables fix..."
          sleep 25

          curl -sf -H "apikey: ${EVOLUTION_API_KEY}" \
            http://localhost:18080/instance/fetchInstances \
            && echo "✅ Evolution API is up" \
            || (echo "❌ Evolution API failed to start" && sudo docker compose -f docker-compose.whatsapp.yml logs && exit 1)

      - name: Update API env vars in Coolify
        run: |
          curl -sf -X PATCH 'http://localhost:8000/api/v1/applications/h81lvlzrwjd7jf8bp0tkg1wa/envs/bulk' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "data": [
                {"key": "EVOLUTION_API_URL", "value": "http://api-evolution-api-1:8080", "is_preview": false},
                {"key": "EVOLUTION_API_KEY", "value": "${{ secrets.EVOLUTION_API_KEY }}", "is_preview": false},
                {"key": "APP_URL", "value": "http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io", "is_preview": false},
                {"key": "WEB_URL", "value": "http://b10i6rz52rphphtcnxll73np.2.24.201.108.sslip.io", "is_preview": false}
              ]
            }' && echo "✅ Env vars updated"

      - name: Redeploy API
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"h81lvlzrwjd7jf8bp0tkg1wa","force":false}' \
            && echo "✅ API redeploy triggered"

  check-webhook-logs:
    name: Ver logs de webhook WhatsApp
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'check-webhook-logs'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Logs NestJS [WH] + Evolution API
        env:
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
        run: |
          echo "=== Tags disponibles en DockerHub (atendai/evolution-api) ==="
          curl -sf "https://hub.docker.com/v2/repositories/atendai/evolution-api/tags?page_size=25&ordering=-name" | \
            python3 -c "import sys,json; [print(t['name']) for t in json.load(sys.stdin).get('results',[])]" 2>/dev/null || echo "(no se pudo consultar DockerHub)"

          echo ""
          echo "=== Versión de Baileys en el contenedor actual ==="
          EVO_CONTAINER=$(sudo docker ps --filter "name=api-evolution-api-1" -q | head -1)
          if [ -n "$EVO_CONTAINER" ]; then
            sudo docker exec "$EVO_CONTAINER" node -e "try{const p=require('/evolution/node_modules/baileys/package.json');console.log('baileys:',p.name,'v'+p.version)}catch(e){try{const p=require('/evolution/node_modules/@whiskeysockets/baileys/package.json');console.log('@whiskeysockets/baileys v'+p.version)}catch(e2){console.log('no encontrado')}}" 2>&1 || echo "(no se pudo leer)"
            echo "Imagen del contenedor:"
            sudo docker inspect "$EVO_CONTAINER" --format '{{.Config.Image}}'
          fi

          echo ""
          echo "=== Logs NestJS — líneas [WH] (webhook recibido) ==="
          API_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          if [ -z "$API_CONTAINER" ]; then
            API_CONTAINER=$(sudo docker ps --filter "name=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          fi
          echo "NestJS container: $(sudo docker inspect $API_CONTAINER --format '{{.Name}}' 2>/dev/null)"
          sudo docker logs "$API_CONTAINER" --since 30m 2>&1 | grep '\[WH\]' || echo "(sin líneas [WH] — webhook no ha recibido eventos)"

          echo ""
          echo "=== Logs Evolution API (últimos 5 min) ==="
          EVO_CONTAINER=$(sudo docker ps --filter "name=api-evolution-api-1" -q | head -1)
          if [ -n "$EVO_CONTAINER" ]; then
            sudo docker logs "$EVO_CONTAINER" --since 5m 2>&1 | tail -60
          else
            echo "(api-evolution-api-1 no encontrado)"
          fi

          echo ""
          echo "=== Env vars del contenedor Evolution API ==="
          sudo docker inspect "$EVO_CONTAINER" --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | grep -E 'AUTHENTICATION|DATABASE|WEBHOOK|SERVER_URL' | sed 's/=.*/=***/' || echo "(no se pudo inspeccionar)"

          echo ""
          echo "=== Conectividad WhatsApp desde el contenedor ==="
          sudo docker exec "$EVO_CONTAINER" curl -s --max-time 10 https://web.whatsapp.com -o /dev/null -w "web.whatsapp.com HTTP:%{http_code} time:%{time_total}s\n" 2>&1 || echo "FALLO: no puede alcanzar web.whatsapp.com"
          sudo docker exec "$EVO_CONTAINER" nslookup g.whatsapp.net 2>&1 | grep -E "Address|Name|error" | head -5 || echo "DNS fallo"

          echo ""
          echo "=== Estado actual: instancias existentes ==="
          curl -s --max-time 5 "http://localhost:18080/instance/fetchInstances" -H "apikey: ${EVOLUTION_API_KEY}" | python3 -c "import sys,json; d=json.load(sys.stdin); items=d if isinstance(d,list) else []; [print('INSTANCE:',i.get('instance',{}).get('instanceName','?'),'state:',i.get('instance',{}).get('state','?')) for i in items] if items else print('(sin instancias)')" 2>/dev/null || echo "(error/timeout)"

          echo ""
          echo "=== Limpieza: DELETE dona-rosa con deleteFiles:true ==="
          curl -s -w "\nHTTP:%{http_code}" -X DELETE "http://localhost:18080/instance/delete/dona-rosa" -H "apikey: ${EVOLUTION_API_KEY}" -H "Content-Type: application/json" -d '{"deleteFiles":true}' 2>/dev/null || true
          echo ""

          echo ""
          echo "=== Test CREATE: sin campo token ==="
          TS=$(date +%s)
          echo "Creando whtest${TS} SIN token:"
          RESP=$(curl -s -w "\nHTTP:%{http_code}" --max-time 35 -X POST "http://localhost:18080/instance/create" -H "apikey: ${EVOLUTION_API_KEY}" -H "Content-Type: application/json" -d "{\"instanceName\":\"whtest${TS}\",\"qrcode\":true}" 2>&1)
          echo "$RESP"
          echo ""

          echo ""
          echo "=== Logs Evolution API completos ==="
          sudo docker logs "$EVO_CONTAINER" 2>&1 | grep -v "^$" | tail -50

          echo ""
          echo "--- Logs NestJS [WH] ---"
          sudo docker logs "$API_CONTAINER" --since 2m 2>&1 | grep '\[WH\]' || echo "(sin eventos webhook)"

          curl -s -X DELETE "http://localhost:18080/instance/delete/whtest${TS}" -H "apikey: ${EVOLUTION_API_KEY}" -H "Content-Type: application/json" -d '{"deleteFiles":true}' 2>/dev/null || true

  diagnose-web:
    name: Diagnosticar conectividad web → API
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'diagnose-web'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Verificar business en API y conectividad desde web container
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          echo "=== 1. Verificar que dona-rosa existe en la DB (via API directo) ==="
          curl -sf http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io/public/business/dona-rosa \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('slug:', d.get('slug'), '| name:', d.get('name'))" \
            || echo "❌ API no devuelve dona-rosa"

          echo ""
          echo "=== 2. Containers corriendo ==="
          sudo docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -v "^NAMES" | head -20

          echo ""
          echo "=== 3. Encontrar web container ==="
          WEB_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=b10i6rz52rphphtcnxll73np" -q | head -1)
          if [ -z "$WEB_CONTAINER" ]; then
            WEB_CONTAINER=$(sudo docker ps --filter "name=b10i6rz52rphphtcnxll73np" -q | head -1)
          fi
          echo "Web container ID: $WEB_CONTAINER"
          if [ -n "$WEB_CONTAINER" ]; then
            echo "Web container name: $(sudo docker inspect $WEB_CONTAINER --format '{{.Name}}')"
            echo "Web container hostname: $(sudo docker inspect $WEB_CONTAINER --format '{{.Config.Hostname}}')"
            echo "Web container networks: $(sudo docker inspect $WEB_CONTAINER --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}')"
          fi

          echo ""
          echo "=== 4. Encontrar API container ==="
          API_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          if [ -z "$API_CONTAINER" ]; then
            API_CONTAINER=$(sudo docker ps --filter "name=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          fi
          echo "API container ID: $API_CONTAINER"
          if [ -n "$API_CONTAINER" ]; then
            echo "API container name: $(sudo docker inspect $API_CONTAINER --format '{{.Name}}')"
            echo "API container hostname: $(sudo docker inspect $API_CONTAINER --format '{{.Config.Hostname}}')"
            echo "API container networks: $(sudo docker inspect $API_CONTAINER --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}')"
            echo "API network aliases: $(sudo docker inspect $API_CONTAINER --format '{{range $k,$v := .NetworkSettings.Networks}}{{range $v.Aliases}}  {{.}} {{end}}{{end}}')"
          fi

          echo ""
          echo "=== 5. Test curl desde web container → API URL pública ==="
          if [ -n "$WEB_CONTAINER" ]; then
            sudo docker exec "$WEB_CONTAINER" \
              wget -qO- --timeout=5 http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io/public/business/dona-rosa \
              2>&1 || echo "❌ wget fallido (posible problema de red interna)"
          else
            echo "⚠️  web container no encontrado"
          fi

          echo ""
          echo "=== 6. Test curl desde web container → API hostname interno ==="
          if [ -n "$WEB_CONTAINER" ] && [ -n "$API_CONTAINER" ]; then
            API_HOSTNAME=$(sudo docker inspect "$API_CONTAINER" --format '{{.Config.Hostname}}')
            echo "Probando http://${API_HOSTNAME}:3000/public/business/dona-rosa ..."
            sudo docker exec "$WEB_CONTAINER" \
              wget -qO- --timeout=5 "http://${API_HOSTNAME}:3000/public/business/dona-rosa" \
              2>&1 || echo "❌ wget al hostname interno fallido"
          fi

          echo ""
          echo "=== 7. Últimas 20 líneas de logs del web container ==="
          if [ -n "$WEB_CONTAINER" ]; then
            sudo docker logs "$WEB_CONTAINER" --tail=20 2>&1 || true
          fi

          echo ""
          echo "=== 8. API_URL env var en web container ==="
          if [ -n "$WEB_CONTAINER" ]; then
            sudo docker inspect "$WEB_CONTAINER" --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -E 'API_URL|NEXT_PUBLIC' || echo "(no API_URL vars encontradas)"
          fi

          echo ""
          echo "=== 9. Test web app URL — /dona-rosa ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://b10i6rz52rphphtcnxll73np.2.24.201.108.sslip.io/dona-rosa)
          echo "HTTP status: ${HTTP_CODE}"
          echo "Primeras 300 chars de la respuesta HTML:"
          curl -s http://b10i6rz52rphphtcnxll73np.2.24.201.108.sslip.io/dona-rosa \
            | grep -o '<title>[^<]*\|Negocio no encontrado\|La Cocina\|dona-rosa\|menuColor\|PideFacil' | head -5 || echo "(sin coincidencias)"

          echo ""
          echo "=== 10. Node.js fetch test desde web container (simula Next.js server-side fetch) ==="
          if [ -n "$WEB_CONTAINER" ]; then
            sudo docker exec "$WEB_CONTAINER" node -e "
              const API_URL = process.env.API_URL ?? process.env.NEXT_PUBLIC_API_URL ?? 'http://localhost:3000';
              const url = API_URL + '/public/business/dona-rosa';
              console.log('process.env.API_URL:', process.env.API_URL);
              console.log('process.env.NEXT_PUBLIC_API_URL:', process.env.NEXT_PUBLIC_API_URL);
              console.log('Fetching URL:', url);
              fetch(url, { cache: 'no-store' })
                .then(r => { console.log('HTTP status:', r.status, r.statusText); return r.text(); })
                .then(body => console.log('Body (first 200 chars):', body.substring(0, 200)))
                .catch(e => console.error('FETCH ERROR:', e.message, e.cause?.message || '', e.cause?.code || ''));
            " 2>&1 || echo "❌ node -e failed"
          fi

          echo ""
          echo "=== 11. Verificar 'no-store' en código compilado ==="
          if [ -n "$WEB_CONTAINER" ]; then
            echo "Grep 'no-store' en .next/server/app:"
            sudo docker exec "$WEB_CONTAINER" grep -rl "no-store" /app/apps/web/.next/server/app/ 2>/dev/null | head -3 \
              || echo "  (no encontrado en /app/apps/web/.next/server/app/)"
            echo "Grep 'revalidate' en .next/server/app:"
            sudo docker exec "$WEB_CONTAINER" grep -rl "revalidate" /app/apps/web/.next/server/app/ 2>/dev/null | head -3 \
              || echo "  (no encontrado)"
            echo "API_URL en código compilado (chunks):"
            sudo docker exec "$WEB_CONTAINER" grep -r "API_URL\|localhost:3000" /app/apps/web/.next/server/ 2>/dev/null \
              | grep -v "Binary" | head -5 || echo "  (no encontrado)"
          fi

          echo ""
          echo "=== 12. Prerender manifest y archivos [slug] ==="
          if [ -n "$WEB_CONTAINER" ]; then
            echo "-- prerender-manifest.json (rutas pre-rendered) --"
            sudo docker exec "$WEB_CONTAINER" cat /app/apps/web/.next/prerender-manifest.json 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); routes=list(d.get('routes',{}).keys()); print('Pre-rendered routes:', routes[:10])" \
              || echo "  (no encontrado)"
            echo "-- Archivos en .next/server/app/[slug]/ --"
            sudo docker exec "$WEB_CONTAINER" ls -la '/app/apps/web/.next/server/app/[slug]/' 2>/dev/null || echo "  (directorio no encontrado)"
            echo "-- Archivos .html en .next/server/app/ --"
            sudo docker exec "$WEB_CONTAINER" find /app/apps/web/.next/server/app -name "*.html" 2>/dev/null | head -10 || echo "  (no hay archivos .html)"
          fi

  restart-evolution:
    name: Reiniciar Evolution API (WhatsApp)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'restart-evolution'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Reiniciar contenedor Evolution API
        run: |
          EVO_CONTAINER=$(sudo docker ps -a --filter "name=api-evolution-api-1" -q | head -1)
          if [ -z "$EVO_CONTAINER" ]; then
            echo "❌ Contenedor api-evolution-api-1 no encontrado"
            sudo docker ps -a --format "table {{.Names}}\t{{.Status}}" | grep -i evol || echo "(ningún contenedor evolution encontrado)"
            exit 1
          fi

          echo "Reiniciando $EVO_CONTAINER..."
          sudo docker restart "$EVO_CONTAINER"
          echo "Esperando 15s para que Evolution API arranque..."
          sleep 15

          echo "=== Estado después del restart ==="
          sudo docker ps --filter "name=api-evolution-api-1" --format "table {{.Names}}\t{{.Status}}"

          echo ""
          echo "=== Últimos logs de Evolution API ==="
          sudo docker logs "$EVO_CONTAINER" --tail 30 2>&1

          echo ""
          echo "=== Test HTTP a Evolution API ==="
          curl -sf --max-time 5 http://localhost:18080/ && echo "✅ Evolution API responde" || echo "❌ Evolution API no responde en puerto 18080"

