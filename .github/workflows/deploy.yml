name: CI/CD — Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pidefacil_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Apply migrations on test DB
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/pidefacil_test
        run: npx prisma migrate deploy

      - name: Run API integration tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/pidefacil_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-minimum-32-characters-long-x
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-xx
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 30d
          NODE_ENV: test
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: pidefacil
        run: npx jest --testPathPattern=integration --testPathIgnorePatterns="files\\.integration" --runInBand --passWithNoTests

  deploy:
    name: Deploy to Coolify
    needs: test
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Deploy API
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"h81lvlzrwjd7jf8bp0tkg1wa","force":false}'

      - name: Deploy Web
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"b10i6rz52rphphtcnxll73np","force":false}'

      - name: Deploy Admin
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"vh3jq4ik26i989m3xmlkrz20","force":false}'
