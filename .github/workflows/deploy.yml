name: CI/CD — Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      job:
        description: 'Job a ejecutar manualmente (setup-whatsapp | seed-data | fix-admin-url)'
        required: false
        default: 'setup-whatsapp'
        type: choice
        options:
          - setup-whatsapp
          - seed-data
          - fix-admin-url
          - read-logs

jobs:
  test:
    name: Integration Tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pidefacil_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Apply migrations on test DB
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/pidefacil_test
        run: npx prisma migrate deploy

      - name: Run API integration tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/pidefacil_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-minimum-32-characters-long-x
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-xx
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 30d
          NODE_ENV: test
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: pidefacil
        run: npx jest --testPathPattern=integration --testPathIgnorePatterns="files\\.integration" --runInBand --passWithNoTests

  deploy:
    name: Deploy to Coolify
    if: github.event_name == 'push'
    needs: test
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Deploy API
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"h81lvlzrwjd7jf8bp0tkg1wa","force":false}'

      - name: Deploy Web
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"b10i6rz52rphphtcnxll73np","force":false}'

      - name: Set Admin env vars (NEXT_PUBLIC_API_URL)
        run: |
          curl -sf -X PATCH 'http://localhost:8000/api/v1/applications/vh3jq4ik26i989m3xmlkrz20/envs/bulk' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "data": [
                {"key": "NEXT_PUBLIC_API_URL", "value": "http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io", "is_preview": false}
              ]
            }' && echo "✅ Admin env vars updated"

      - name: Deploy Admin
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"vh3jq4ik26i989m3xmlkrz20","force":false}'

  fix-admin-url:
    name: Fix admin NEXT_PUBLIC_API_URL + redeploy
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'fix-admin-url'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Set NEXT_PUBLIC_API_URL in Coolify for admin
        run: |
          curl -sf -X PATCH 'http://localhost:8000/api/v1/applications/vh3jq4ik26i989m3xmlkrz20/envs/bulk' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "data": [
                {"key": "NEXT_PUBLIC_API_URL", "value": "http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io", "is_preview": false}
              ]
            }' && echo "✅ Env var set"

      - name: Redeploy Admin
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"vh3jq4ik26i989m3xmlkrz20","force":true}' \
            && echo "✅ Admin redeploy triggered"

  seed-data:
    name: Seed super admin + 3 fondas demo
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'seed-data'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Seed super admin via API container (docker exec)
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_KEY }}
          SEED_SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
          SEED_SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}
        run: |
          # Find the Coolify API container (by label or name pattern)
          API_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          if [ -z "$API_CONTAINER" ]; then
            API_CONTAINER=$(sudo docker ps --filter "name=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          fi
          if [ -z "$API_CONTAINER" ]; then
            echo "❌ API container not found"
            sudo docker ps --format "table {{.Names}}\t{{.Status}}"
            exit 1
          fi
          echo "API container: $(sudo docker inspect $API_CONTAINER --format '{{.Name}}')"

          SA_EMAIL="${SEED_SUPER_ADMIN_EMAIL:-superadmin@pidefacil.com}"
          SA_PASS="${SEED_SUPER_ADMIN_PASSWORD:-ChangeMe123!}"

          # Copy seed script from repo into container and execute
          sudo docker cp apps/api/prisma/seed-admin.cjs "${API_CONTAINER}:/tmp/seed-admin.cjs"
          sudo docker exec \
            -e SA_EMAIL="${SA_EMAIL}" \
            -e SA_PASS="${SA_PASS}" \
            "${API_CONTAINER}" \
            node /tmp/seed-admin.cjs
          echo "✅ Super admin seed OK → ${SA_EMAIL}"

      - name: Seed 3 fondas demo (via API container, Node ESM)
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          API_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          if [ -z "$API_CONTAINER" ]; then
            API_CONTAINER=$(sudo docker ps --filter "name=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          fi
          sudo docker cp apps/api/prisma/seed-demo.mjs "${API_CONTAINER}:/tmp/seed-demo.mjs"
          sudo docker exec \
            -e API_URL='http://localhost:3000' \
            "${API_CONTAINER}" \
            node /tmp/seed-demo.mjs
          echo "✅ Demo seed OK"

  setup-whatsapp:
    name: Setup Evolution API (WhatsApp)
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'setup-whatsapp' || github.event.inputs.job == '')
    runs-on: [self-hosted, linux, deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Start Evolution API
        env:
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          # Step 1: Get DATABASE_URL from Coolify to extract the internal PG hostname
          COOLIFY_RESPONSE=$(curl -sf 'http://localhost:8000/api/v1/applications/h81lvlzrwjd7jf8bp0tkg1wa/envs' \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" || echo "[]")
          echo "Coolify API response (first 300 chars): ${COOLIFY_RESPONSE:0:300}"

          DB_URL=$(echo "$COOLIFY_RESPONSE" | python3 -c "import sys,json; data=json.load(sys.stdin) if sys.stdin else []; items=data if isinstance(data,list) else data.get('data',[]); [print(e.get('value','')) for e in items if e.get('key')=='DATABASE_URL']" 2>/dev/null || true)
          echo "DB_URL from Coolify (first 60 chars): ${DB_URL:0:60}"

          DB_HOSTNAME=$(echo "$DB_URL" | python3 -c "import sys,re; m=re.search(r'@([^:/]+)', sys.stdin.read().strip()); print(m.group(1) if m else '')" 2>/dev/null || true)
          echo "PG hostname from Coolify URL: ${DB_HOSTNAME}"

          # Step 2: Find PG container — prefer hostname match from Coolify URL
          PG_CONTAINER=""
          if [ -n "${DB_HOSTNAME}" ]; then
            PG_CONTAINER=$(sudo docker ps -q | while read cid; do
              h=$(sudo docker inspect "$cid" --format '{{.Config.Hostname}}' 2>/dev/null)
              if [ "$h" = "$DB_HOSTNAME" ]; then
                sudo docker inspect "$cid" --format '{{.Name}}' | tr -d '/'
                break
              fi
            done)
          fi

          # Fallback: find PG container with POSTGRES_DB=pidefacil in its env
          if [ -z "${PG_CONTAINER}" ]; then
            PG_CONTAINER=$(sudo docker ps -q | while read cid; do
              env=$(sudo docker inspect "$cid" --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null)
              if echo "$env" | grep -q 'POSTGRES_DB=pidefacil'; then
                sudo docker inspect "$cid" --format '{{.Name}}' | tr -d '/'
                break
              fi
            done)
          fi

          echo "PostgreSQL container: ${PG_CONTAINER}"

          if [ -z "${PG_CONTAINER}" ]; then
            echo "❌ Could not find pidefacil PostgreSQL container. Running containers:"
            sudo docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
            exit 1
          fi

          # Step 3: Get credentials from the container's environment
          PG_ENV=$(sudo docker inspect "${PG_CONTAINER}" --format '{{range .Config.Env}}{{println .}}{{end}}')
          PG_USER=$(echo "$PG_ENV" | grep -E '^POSTGRES_USER=' | cut -d= -f2-)
          PG_PASS=$(echo "$PG_ENV" | grep -E '^POSTGRES_PASSWORD=' | cut -d= -f2-)
          [ -z "$PG_USER" ] && PG_USER=$(echo "$PG_ENV" | grep -E '^POSTGRESQL_USERNAME=' | cut -d= -f2-)
          [ -z "$PG_PASS" ] && PG_PASS=$(echo "$PG_ENV" | grep -E '^POSTGRESQL_PASSWORD=' | cut -d= -f2-)
          PG_USER="${PG_USER:-postgres}"

          # Use Coolify hostname (the DNS name that resolves inside Coolify's network)
          # If Coolify hostname is unknown, fall back to the container's Config.Hostname
          if [ -n "${DB_HOSTNAME}" ]; then
            PG_HOST="${DB_HOSTNAME}"
          else
            PG_HOST=$(sudo docker inspect "${PG_CONTAINER}" --format '{{.Config.Hostname}}')
          fi

          # Prefer the non-bridge Coolify internal network
          PG_NETWORK=$(sudo docker inspect "${PG_CONTAINER}" \
            --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
            | tr ' ' '\n' | grep -v '^$' | grep -v '^bridge$' | head -1)
          [ -z "${PG_NETWORK}" ] && PG_NETWORK=$(sudo docker inspect "${PG_CONTAINER}" \
            --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
            | tr ' ' '\n' | grep -v '^$' | head -1)

          echo "PG host: ${PG_HOST}, network: ${PG_NETWORK}, user: ${PG_USER}"

          if [ -z "${PG_HOST}" ]; then
            echo "❌ Could not determine PostgreSQL hostname"
            exit 1
          fi

          # Step 4: Build Evolution API DB URL
          EVO_DB_URL="postgresql://${PG_USER}:${PG_PASS}@${PG_HOST}:5432/evolution_api"
          echo "EVO_DB_URL target: evolution_api on ${PG_HOST}"

          # Step 5: Create evolution_api database in PG
          sudo docker exec "${PG_CONTAINER}" \
            psql -U "${PG_USER}" -c "CREATE DATABASE evolution_api;" 2>&1 \
            | grep -v "already exists" || true

          cd apps/api

          # Clean up previous evolution containers
          printf "EVOLUTION_API_KEY=x\nDATABASE_CONNECTION_URI=x\n" > .env.whatsapp.tmp
          sudo docker compose -f docker-compose.whatsapp.yml --env-file .env.whatsapp.tmp down --remove-orphans 2>/dev/null || true
          rm -f .env.whatsapp.tmp
          sudo docker ps -a --filter "name=evolution" -q | xargs -r sudo docker rm -f 2>/dev/null || true
          echo "--- Containers cleaned ---"

          # Start Redis + Evolution API (bridge mode, port 18080→8080)
          printf "EVOLUTION_API_KEY=%s\nDATABASE_CONNECTION_URI=%s\n" \
            "${EVOLUTION_API_KEY}" "${EVO_DB_URL}" > .env.whatsapp
          sudo docker compose -f docker-compose.whatsapp.yml --env-file .env.whatsapp pull
          sudo docker compose -f docker-compose.whatsapp.yml --env-file .env.whatsapp up -d --wait --wait-timeout 60
          rm -f .env.whatsapp

          # Connect evolution-api to Coolify's internal network so it can resolve the PG hostname
          if [ -n "${PG_NETWORK}" ]; then
            sudo docker network connect "${PG_NETWORK}" api-evolution-api-1
            echo "Connected to Coolify network: ${PG_NETWORK}"
            sudo docker restart api-evolution-api-1
            echo "Waiting for restart..."
            sleep 20
          fi

          curl -sf -H "apikey: ${EVOLUTION_API_KEY}" \
            http://localhost:18080/instance/fetchInstances \
            && echo "✅ Evolution API is up" \
            || (echo "❌ Evolution API failed to start" && sudo docker compose -f docker-compose.whatsapp.yml logs && exit 1)

      - name: Update API env vars in Coolify
        run: |
          curl -sf -X PATCH 'http://localhost:8000/api/v1/applications/h81lvlzrwjd7jf8bp0tkg1wa/envs/bulk' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "data": [
                {"key": "EVOLUTION_API_URL", "value": "http://api-evolution-api-1:8080", "is_preview": false},
                {"key": "EVOLUTION_API_KEY", "value": "${{ secrets.EVOLUTION_API_KEY }}", "is_preview": false}
              ]
            }' && echo "✅ Env vars updated"

      - name: Redeploy API
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"h81lvlzrwjd7jf8bp0tkg1wa","force":false}' \
            && echo "✅ API redeploy triggered"

  read-logs:
    name: Read API container logs (WhatsApp debug)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'read-logs'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Debug Evolution API directly
        env:
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
        run: |
          echo "=== Network connectivity from VPS host ==="
          curl -sv --max-time 8 https://web.whatsapp.com/ 2>&1 | grep -E 'Connected|Failed|SSL|TLS|HTTP|curl:|<|>' | head -15 || echo "(curl to whatsapp failed)"

          echo ""
          echo "=== Network connectivity FROM Evolution API container (Node.js) ==="
          EVO_CONTAINER=$(sudo docker ps --filter "name=api-evolution-api-1" -q | head -1)
          if [ -n "$EVO_CONTAINER" ]; then
            echo "Container: $EVO_CONTAINER"
            sudo docker exec "$EVO_CONTAINER" node -e "require('https').get('https://web.whatsapp.com/',r=>{console.log('WA HTTP status:',r.statusCode)}).on('error',e=>console.log('WA ERROR:',e.message))" 2>&1 || echo "(node exec failed)"
            sudo docker exec "$EVO_CONTAINER" node -e "require('https').get('https://www.google.com/',r=>{console.log('Google HTTP status:',r.statusCode)}).on('error',e=>console.log('Google ERROR:',e.message))" 2>&1 || echo "(node google exec failed)"
            echo "Networks for container:"
            sudo docker inspect "$EVO_CONTAINER" --format '{{range $k,$v := .NetworkSettings.Networks}}  {{$k}}{{end}}'
          else
            echo "(api-evolution-api-1 not found)"
          fi

          echo ""
          echo "=== Create instance + rapid poll (every 1s for 60s) ==="
          curl -s -X DELETE "http://localhost:18080/instance/delete/debug-qr" -H "apikey: ${EVOLUTION_API_KEY}" -H "Content-Type: application/json" -d '{"deleteFiles":false}' 2>/dev/null || true
          sleep 2
          CREATE=$(curl -s -X POST "http://localhost:18080/instance/create" -H "apikey: ${EVOLUTION_API_KEY}" -H "Content-Type: application/json" -d '{"instanceName":"debug-qr","qrcode":true,"integration":"WHATSAPP-BAILEYS"}')
          echo "Create qrcode field: $(echo $CREATE | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("qrcode","missing"))' 2>/dev/null)"

          for i in $(seq 1 60); do
            sleep 1
            CONN=$(curl -s -H "apikey: ${EVOLUTION_API_KEY}" "http://localhost:18080/instance/connect/debug-qr")
            B64=$(echo "$CONN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('base64',''))" 2>/dev/null || echo "")
            COUNT=$(echo "$CONN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('count',0))" 2>/dev/null || echo "0")
            if [ -n "$B64" ] && [ "$B64" != "None" ] && [ "$B64" != "" ]; then
              echo "[${i}s] QR FOUND! base64 starts: ${B64:0:50}"
              break
            else
              if [ $((i % 10)) -eq 0 ]; then
                echo "[${i}s] no QR yet, count=$COUNT"
              fi
            fi
          done

          echo ""
          echo "=== Redis connectivity from Evolution API container ==="
          if [ -n "$EVO_CONTAINER" ]; then
            sudo docker exec "$EVO_CONTAINER" node -e "const net=require('net');const c=net.createConnection(6379,'evolution-redis',()=>{console.log('Redis TCP OK');c.end();process.exit(0)});c.on('error',e=>{ console.log('Redis TCP ERROR:',e.message);process.exit(1)});setTimeout(()=>{console.log('Redis TCP TIMEOUT');process.exit(2)},5000)" 2>&1 || echo "(node redis test failed)"
          fi

          echo ""
          echo "=== Evolution API env check (REDIS_ENABLED) ==="
          if [ -n "$EVO_CONTAINER" ]; then
            sudo docker exec "$EVO_CONTAINER" node -e "console.log('REDIS_ENABLED:',process.env.REDIS_ENABLED);console.log('REDIS_URI:',process.env.REDIS_URI ? process.env.REDIS_URI.replace(/:\/\/.*@/,'://***@') : 'not set');console.log('DATABASE_CONNECTION_URI set:',!!process.env.DATABASE_CONNECTION_URI)" 2>&1 || echo "(env check failed)"
          fi

          echo ""
          echo "=== Evolution API logs (last 5 min) ==="
          if [ -n "$EVO_CONTAINER" ]; then
            sudo docker logs "$EVO_CONTAINER" --since 5m 2>&1 || true
          fi

          echo ""
          echo "=== Cleanup ==="
          curl -s -X DELETE "http://localhost:18080/instance/delete/debug-qr" -H "apikey: ${EVOLUTION_API_KEY}" -H "Content-Type: application/json" -d '{"deleteFiles":false}' || true

      - name: Print NestJS API [WA] logs
        run: |
          API_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          if [ -z "$API_CONTAINER" ]; then
            API_CONTAINER=$(sudo docker ps --filter "name=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          fi
          echo "NestJS container: $(sudo docker inspect $API_CONTAINER --format '{{.Name}}')"
          echo "--- [WA] log lines ---"
          sudo docker logs "$API_CONTAINER" --tail=500 2>&1 | grep '\[WA\]' || echo "(no [WA] lines found)"
