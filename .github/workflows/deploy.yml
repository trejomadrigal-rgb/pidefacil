name: CI/CD — Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      job:
        description: 'Job a ejecutar manualmente'
        required: false
        default: 'setup-whatsapp'
        type: choice
        options:
          - setup-whatsapp
          - restart-evolution
          - seed-data
          - fix-admin-url
          - check-webhook-logs
          - diagnose-web

jobs:
  test:
    name: Integration Tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pidefacil_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Apply migrations on test DB
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/pidefacil_test
        run: npx prisma migrate deploy

      - name: Run API integration tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/pidefacil_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-minimum-32-characters-long-x
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-xx
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 30d
          NODE_ENV: test
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: pidefacil
        run: npx jest --testPathPattern=integration --testPathIgnorePatterns="files\\.integration" --runInBand --passWithNoTests

  deploy:
    name: Deploy to Coolify
    if: github.event_name == 'push'
    needs: test
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Deploy API
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"h81lvlzrwjd7jf8bp0tkg1wa","force":false}'

      - name: Set Web env vars (NEXT_PUBLIC_API_URL + Firebase)
        run: |
          # Use the stable public URL for both client and server-side fetches.
          # Firebase web config is public (embedded in browser bundle) — safe to inline.
          curl -sf -X PATCH 'http://localhost:8000/api/v1/applications/b10i6rz52rphphtcnxll73np/envs/bulk' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "data": [
                {"key": "NEXT_PUBLIC_API_URL", "value": "http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io", "is_preview": false},
                {"key": "API_URL", "value": "http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io", "is_preview": false},
                {"key": "NEXT_PUBLIC_FIREBASE_API_KEY", "value": "AIzaSyC_DQkm9B6oqFflcyAuNvYmXgw7H8bSqQA", "is_preview": false},
                {"key": "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN", "value": "pidefacil-76602.firebaseapp.com", "is_preview": false},
                {"key": "NEXT_PUBLIC_FIREBASE_DATABASE_URL", "value": "https://pidefacil-76602-default-rtdb.firebaseio.com", "is_preview": false},
                {"key": "NEXT_PUBLIC_FIREBASE_PROJECT_ID", "value": "pidefacil-76602", "is_preview": false},
                {"key": "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET", "value": "pidefacil-76602.firebasestorage.app", "is_preview": false},
                {"key": "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID", "value": "203313412606", "is_preview": false},
                {"key": "NEXT_PUBLIC_FIREBASE_APP_ID", "value": "1:203313412606:web:8bd0b2f8fac5323bf0e8af", "is_preview": false}
              ]
            }' && echo "✅ Web env vars updated"

      - name: Deploy Web
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"b10i6rz52rphphtcnxll73np","force":false}'

      - name: Set Admin env vars (NEXT_PUBLIC_API_URL)
        run: |
          curl -sf -X PATCH 'http://localhost:8000/api/v1/applications/vh3jq4ik26i989m3xmlkrz20/envs/bulk' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "data": [
                {"key": "NEXT_PUBLIC_API_URL", "value": "http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io", "is_preview": false}
              ]
            }' && echo "✅ Admin env vars updated"

      - name: Deploy Admin
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"vh3jq4ik26i989m3xmlkrz20","force":false}'

  fix-admin-url:
    name: Fix admin NEXT_PUBLIC_API_URL + redeploy
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'fix-admin-url'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Set NEXT_PUBLIC_API_URL in Coolify for admin
        run: |
          curl -sf -X PATCH 'http://localhost:8000/api/v1/applications/vh3jq4ik26i989m3xmlkrz20/envs/bulk' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "data": [
                {"key": "NEXT_PUBLIC_API_URL", "value": "http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io", "is_preview": false}
              ]
            }' && echo "✅ Env var set"

      - name: Redeploy Admin
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"vh3jq4ik26i989m3xmlkrz20","force":true}' \
            && echo "✅ Admin redeploy triggered"

  seed-data:
    name: Seed super admin + 3 fondas demo
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'seed-data'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Seed super admin via API container (docker exec)
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_KEY }}
          SEED_SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
          SEED_SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}
        run: |
          # Find the Coolify API container (by label or name pattern)
          API_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          if [ -z "$API_CONTAINER" ]; then
            API_CONTAINER=$(sudo docker ps --filter "name=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          fi
          if [ -z "$API_CONTAINER" ]; then
            echo "❌ API container not found"
            sudo docker ps --format "table {{.Names}}\t{{.Status}}"
            exit 1
          fi
          echo "API container: $(sudo docker inspect $API_CONTAINER --format '{{.Name}}')"

          SA_EMAIL="${SEED_SUPER_ADMIN_EMAIL:-superadmin@pidefacil.com}"
          SA_PASS="${SEED_SUPER_ADMIN_PASSWORD:-ChangeMe123!}"

          # Copy seed script from repo into container and execute
          sudo docker cp apps/api/prisma/seed-admin.cjs "${API_CONTAINER}:/tmp/seed-admin.cjs"
          sudo docker exec \
            -e SA_EMAIL="${SA_EMAIL}" \
            -e SA_PASS="${SA_PASS}" \
            "${API_CONTAINER}" \
            node /tmp/seed-admin.cjs
          echo "✅ Super admin seed OK → ${SA_EMAIL}"

      - name: Wait for API container to be healthy
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          echo "Waiting for API to be healthy (up to 8 min)..."
          for i in $(seq 1 96); do
            STATUS=$(curl -sf -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              "http://localhost:8000/api/v1/applications/h81lvlzrwjd7jf8bp0tkg1wa" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")
            if echo "$STATUS" | grep -q "running"; then
              echo "✅ Coolify reports API running after $((i * 5))s (status=$STATUS)"
              sleep 5
              break
            fi
            if [ $i -eq 96 ]; then
              echo "❌ API did not become healthy in 8 min (last status: $STATUS)"
              exit 1
            fi
            echo "  attempt $i/96, status=$STATUS..."
            sleep 5
          done

      - name: Seed 3 fondas demo (via API container, Node ESM)
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          API_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          if [ -z "$API_CONTAINER" ]; then
            API_CONTAINER=$(sudo docker ps --filter "name=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          fi
          sudo docker cp apps/api/prisma/seed-demo.mjs "${API_CONTAINER}:/tmp/seed-demo.mjs"
          sudo docker exec \
            -e API_URL='http://localhost:3000' \
            "${API_CONTAINER}" \
            node /tmp/seed-demo.mjs || {
            echo "❌ Seed failed — last 50 API container log lines:"
            sudo docker logs --tail=50 "${API_CONTAINER}"
            exit 1
          }
          echo "✅ Demo seed OK"

  setup-whatsapp:
    name: Configurar Evolution API v2 (WhatsApp)
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'setup-whatsapp' || github.event.inputs.job == '')
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Verificar/iniciar Evolution v2 + actualizar env vars del API
        env:
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          echo "=== Estado de Evolution v2 ==="
          EVO_STATUS=$(sudo docker inspect evolution-v2-evolution-api-1 --format '{{.State.Status}}' 2>/dev/null | tr -d '[:space:]'); [ -z "$EVO_STATUS" ] && EVO_STATUS="not_found"
          echo "Container status: $EVO_STATUS"
          sudo docker ps -a --filter "name=evolution" --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"

          # Si el contenedor existe pero está parado, reiniciarlo
          if [ "$EVO_STATUS" = "exited" ] || [ "$EVO_STATUS" = "created" ]; then
            echo "Container parado — iniciando..."
            sudo docker start evolution-v2-evolution-api-1
            sleep 15
            EVO_STATUS=$(sudo docker inspect evolution-v2-evolution-api-1 --format '{{.State.Status}}' 2>/dev/null | tr -d '[:space:]'); [ -z "$EVO_STATUS" ] && EVO_STATUS="not_found"
            echo "Status después de start: $EVO_STATUS"
          fi

          # Si el contenedor existe pero está en restarting (configuración incorrecta), eliminarlo
          if [ "$EVO_STATUS" = "restarting" ]; then
            echo "Container en restarting — eliminando para recrear con configuración correcta..."
            sudo docker rm -f evolution-v2-evolution-api-1 2>/dev/null || true
            EVO_STATUS="not_found"
          fi

          # Si el contenedor no existe, buscar en Coolify y en directorios de datos
          if [ "$EVO_STATUS" = "not_found" ]; then
            echo "Container no existe — búsqueda completa..."

            # 1. Lista completa de servicios Coolify (buscar "evolution" en nombre o compose)
            ALL_SERVICES=$(curl -sf -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              'http://localhost:8000/api/v1/services' 2>/dev/null || echo "[]")
            echo "Total servicios Coolify: $(echo "$ALL_SERVICES" | python3 -c "import sys,json;d=json.load(sys.stdin);print(len(d if isinstance(d,list) else d.get('data',[])))" 2>/dev/null)"
            echo "Nombres: $(echo "$ALL_SERVICES" | python3 -c "import sys,json;d=json.load(sys.stdin);items=d if isinstance(d,list) else d.get('data',[]);[print(i.get('name','?'), i.get('uuid','?')) for i in items]" 2>/dev/null)"

            EVO_UUID=$(echo "$ALL_SERVICES" | python3 -c "import sys,json;d=json.load(sys.stdin);items=d if isinstance(d,list) else d.get('data',[]);[print(i.get('uuid','')) for i in items if 'evolution' in i.get('name','').lower() or 'evolution' in i.get('docker_compose_raw','').lower()]" 2>/dev/null | head -1 || true)

            # 2. Si no en services, buscar en docker compose ls
            if [ -z "$EVO_UUID" ]; then
              echo "Proyectos docker compose en el VPS:"
              sudo docker compose ls 2>/dev/null || sudo docker compose ls -a 2>/dev/null || true
            fi

            # 3. Buscar compose file con "evolution" en directorios de Coolify
            EVO_COMPOSE=""
            if [ -z "$EVO_UUID" ]; then
              EVO_COMPOSE=$(find /data/coolify /var/lib/coolify /root/.config/coolify /home -maxdepth 8 \
                -name "docker-compose.yml" -o -name "docker-compose.yaml" 2>/dev/null | \
                while IFS= read -r f; do
                  grep -ql "evolution.api\|evolution-api\|evolution_api" "$f" 2>/dev/null && echo "$f" && break
                done)
              echo "Compose file con evolution: ${EVO_COMPOSE:-no encontrado}"
            fi

            if [ -n "$EVO_UUID" ]; then
              echo "Encontrado en Coolify con UUID=${EVO_UUID} — restart..."
              curl -sf -X GET "http://localhost:8000/api/v1/services/${EVO_UUID}/start" \
                -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
                && echo "✅ Start triggered" \
                || curl -sf -X POST "http://localhost:8000/api/v1/deploy" \
                     -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
                     -H 'Content-Type: application/json' \
                     -d "{\"uuid\":\"${EVO_UUID}\",\"force\":true}" \
                     && echo "✅ Redeploy triggered"
              sleep 60
            elif [ -n "$EVO_COMPOSE" ]; then
              echo "Reiniciando con compose file: $EVO_COMPOSE"
              cd "$(dirname "$EVO_COMPOSE")"
              sudo docker compose up -d 2>&1
              sleep 30
            else
              echo "Container no encontrado en Coolify ni compose. Iniciando fresh con docker run..."

              # Obtener credenciales de la base de datos desde Coolify
              COOLIFY_ENV=$(curl -sf -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
                'http://localhost:8000/api/v1/applications/h81lvlzrwjd7jf8bp0tkg1wa/envs' 2>/dev/null || echo "[]")
              RAW_DB_URL=$(echo "$COOLIFY_ENV" | python3 -c "import sys,json;d=json.load(sys.stdin);items=d if isinstance(d,list) else d.get('data',[]);[print(i.get('value','')) for i in items if i.get('key')=='DATABASE_URL']" 2>/dev/null | head -1 || true)
              echo "DB URL (host only): $(echo "$RAW_DB_URL" | sed 's|//[^@]*@|//***:***@|')"

              # Extraer partes del URL para construir el de evolution_api
              PG_HOST=$(echo "$RAW_DB_URL" | python3 -c "import sys,re;m=re.search(r'@([^:/]+)',sys.stdin.read().strip());print(m.group(1) if m else '')" 2>/dev/null)
              PG_USER=$(echo "$RAW_DB_URL" | python3 -c "import sys,re;m=re.search(r'//([^:]+):',sys.stdin.read().strip());print(m.group(1) if m else '')" 2>/dev/null)
              PG_PASS=$(echo "$RAW_DB_URL" | python3 -c "import sys,re;m=re.search(r'//[^:]+:([^@]+)@',sys.stdin.read().strip());print(m.group(1) if m else '')" 2>/dev/null)
              echo "PG host: $PG_HOST, user: $PG_USER"

              # Crear base de datos evolution_api si no existe
              if [ -n "$PG_HOST" ]; then
                PG_CONTAINER=$(sudo docker ps -q | while read cid; do
                  h=$(sudo docker inspect "$cid" --format '{{.Config.Hostname}}' 2>/dev/null)
                  [ "$h" = "$PG_HOST" ] && echo "$cid" && break
                done)
                echo "PG container: $PG_CONTAINER"
                if [ -n "$PG_CONTAINER" ]; then
                  sudo docker exec "$PG_CONTAINER" psql -U "$PG_USER" -c "CREATE DATABASE evolution_api;" 2>/dev/null \
                    && echo "✅ evolution_api DB creada" \
                    || echo "ℹ️  evolution_api ya existe (o error)"
                fi
                EVO_DB_URL="postgresql://${PG_USER}:${PG_PASS}@${PG_HOST}:5432/evolution_api"
              else
                echo "⚠️  No se pudo obtener DB URL — Evolution v2 puede no persistir datos"
                EVO_DB_URL=""
              fi

              # Eliminar container anterior si existe en estado error/restarting
              sudo docker rm -f evolution-v2-evolution-api-1 2>/dev/null || true

              # Iniciar Evolution v2 con PostgreSQL
              sudo docker run -d \
                --name evolution-v2-evolution-api-1 \
                --network coolify \
                --restart unless-stopped \
                -e AUTHENTICATION_API_KEY="${EVOLUTION_API_KEY}" \
                -e AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true \
                -e AUTHENTICATION_TYPE=apikey \
                -e DEL_INSTANCE=false \
                -e QRCODE_LIMIT=30 \
                -e TELEMETRY_ENABLED=false \
                -e LOG_LEVEL=ERROR \
                -e DATABASE_ENABLED=true \
                -e DATABASE_PROVIDER=postgresql \
                -e DATABASE_URL="${EVO_DB_URL}" \
                -e DATABASE_CONNECTION_URI="${EVO_DB_URL}" \
                atendai/evolution-api:v2.2.3 \
                && echo "✅ Evolution v2 container iniciado" \
                || (echo "❌ docker run falló" && exit 1)
              echo "Esperando 30s para que arranque..."
              sleep 30
            fi

            EVO_STATUS=$(sudo docker inspect evolution-v2-evolution-api-1 --format '{{.State.Status}}' 2>/dev/null | tr -d '[:space:]'); [ -z "$EVO_STATUS" ] && EVO_STATUS="not_found"
            echo "Status tras búsqueda: $EVO_STATUS"
          fi

          # Dar tiempo extra si está en 'restarting' (puede tardar en iniciar)
          if [ "$EVO_STATUS" = "restarting" ]; then
            echo "Container en restarting — esperando 30s más..."
            sleep 30
            EVO_STATUS=$(sudo docker inspect evolution-v2-evolution-api-1 --format '{{.State.Status}}' 2>/dev/null | tr -d '[:space:]'); [ -z "$EVO_STATUS" ] && EVO_STATUS="not_found"
            echo "Status final: $EVO_STATUS"
          fi

          if [ "$EVO_STATUS" != "running" ]; then
            echo "❌ Evolution v2 no está running (status=$EVO_STATUS)"
            echo "=== Últimos logs ==="
            sudo docker logs evolution-v2-evolution-api-1 --tail 30 2>&1 || true
            exit 1
          fi

          echo ""
          echo "=== Redes de Evolution v2 ==="
          sudo docker inspect evolution-v2-evolution-api-1 \
            --format '{{range $k,$v := .NetworkSettings.Networks}}NETWORK: {{$k}} IP: {{$v.IPAddress}}{{println}}{{end}}'

          echo ""
          echo "=== Asegurar que Evolution v2 está en la red coolify ==="
          sudo docker network connect coolify evolution-v2-evolution-api-1 2>/dev/null \
            && echo "✅ Evolution v2 conectado a red coolify" \
            || echo "ℹ️  Ya estaba en red coolify"

          echo ""
          echo "=== Actualizando env vars del NestJS API en Coolify ==="
          curl -sf -X PATCH 'http://localhost:8000/api/v1/applications/h81lvlzrwjd7jf8bp0tkg1wa/envs/bulk' \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"data\": [
                {\"key\": \"EVOLUTION_API_URL\", \"value\": \"http://evolution-v2-evolution-api-1:8080\", \"is_preview\": false},
                {\"key\": \"EVOLUTION_API_KEY\",  \"value\": \"${EVOLUTION_API_KEY}\",                   \"is_preview\": false}
              ]
            }" && echo "✅ Env vars actualizadas (URL=http://evolution-v2-evolution-api-1:8080)"

          echo ""
          echo "=== Asegurar que el API container está en la red coolify ==="
          API_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          if [ -z "$API_CONTAINER" ]; then
            API_CONTAINER=$(sudo docker ps --filter "name=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          fi
          if [ -n "$API_CONTAINER" ]; then
            echo "API container: $(sudo docker inspect $API_CONTAINER --format '{{.Name}}')"
            sudo docker network connect coolify "$API_CONTAINER" 2>/dev/null \
              && echo "✅ API conectada a red coolify" \
              || echo "ℹ️  Ya estaba en red coolify"
          else
            echo "⚠️  API container no encontrado — redeploy la aplicará cuando inicie"
          fi

      - name: Redeploy NestJS API
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"h81lvlzrwjd7jf8bp0tkg1wa","force":false}' \
            && echo "✅ API redeploy disparado"

  check-webhook-logs:
    name: Diagnosticar WhatsApp + Evolution v2
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'check-webhook-logs'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Estado de contenedores + logs NestJS/Evolution v2
        env:
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
        run: |
          echo "=== Contenedores evolution en ejecución ==="
          sudo docker ps --filter "name=evolution" --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"

          echo ""
          echo "=== Evolution v2 — redes e imagen ==="
          EVO_CONTAINER=$(sudo docker ps --filter "name=evolution-v2-evolution-api-1" -q | head -1)
          if [ -n "$EVO_CONTAINER" ]; then
            echo "Imagen: $(sudo docker inspect $EVO_CONTAINER --format '{{.Config.Image}}')"
            sudo docker inspect "$EVO_CONTAINER" \
              --format '{{range $k,$v := .NetworkSettings.Networks}}NETWORK: {{$k}} IP: {{$v.IPAddress}}{{println}}{{end}}'
            # Detect host port if exposed
            HOST_PORT=$(sudo docker inspect "$EVO_CONTAINER" \
              --format '{{range $p,$v := .NetworkSettings.Ports}}{{if $v}}{{$p}} → {{range $v}}{{.HostPort}}{{end}}{{println}}{{end}}{{end}}' \
              | grep "8080" | grep -o '[0-9]*$' | head -1)
            echo "Host port para 8080: ${HOST_PORT:-no expuesto}"
          else
            echo "❌ evolution-v2-evolution-api-1 no encontrado"
          fi

          echo ""
          echo "=== NestJS API — env vars EVOLUTION ==="
          API_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          if [ -z "$API_CONTAINER" ]; then
            API_CONTAINER=$(sudo docker ps --filter "name=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          fi
          if [ -n "$API_CONTAINER" ]; then
            echo "API container: $(sudo docker inspect $API_CONTAINER --format '{{.Name}}')"
            echo "EVOLUTION vars en API:"
            sudo docker inspect "$API_CONTAINER" \
              --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null \
              | grep -i "EVOLUTION" || echo "(EVOLUTION vars no encontradas — redeploy pendiente?)"
            echo ""
            echo "Redes del API container:"
            sudo docker inspect "$API_CONTAINER" \
              --format '{{range $k,$v := .NetworkSettings.Networks}}  {{$k}} → {{$v.IPAddress}}{{println}}{{end}}'
          else
            echo "❌ API container no encontrado"
          fi

          echo ""
          echo "=== Logs NestJS — líneas [WH] (últimos 30 min) ==="
          if [ -n "$API_CONTAINER" ]; then
            sudo docker logs "$API_CONTAINER" --since 30m 2>&1 | grep '\[WH\]\|WhatsApp\|Evolution\|\[WA\]' | tail -20 \
              || echo "(sin líneas WhatsApp recientes)"
          fi

          echo ""
          echo "=== Logs NestJS — errores recientes (últimos 10 min) ==="
          if [ -n "$API_CONTAINER" ]; then
            sudo docker logs "$API_CONTAINER" --since 10m 2>&1 | grep -i "error\|timeout\|ECONNREFUSED\|exception" | tail -20 \
              || echo "(sin errores recientes)"
          fi

          echo ""
          echo "=== Logs Evolution v2 (últimos 5 min) ==="
          if [ -n "$EVO_CONTAINER" ]; then
            sudo docker logs "$EVO_CONTAINER" --since 5m 2>&1 | tail -40
          fi

          echo ""
          echo "=== Test: conectividad API → Evolution v2 ==="
          if [ -n "$API_CONTAINER" ] && [ -n "$EVO_CONTAINER" ]; then
            echo "Desde API container → evolution-v2-evolution-api-1:8080:"
            sudo docker exec "$API_CONTAINER" \
              wget -qO- --timeout=8 http://evolution-v2-evolution-api-1:8080/ 2>&1 | head -3 \
              || echo "❌ No hay conectividad API → Evolution v2"
          fi

          echo ""
          echo "=== Test: instancias existentes en Evolution v2 ==="
          if [ -n "$EVO_CONTAINER" ]; then
            # Try via API container first (internal network)
            if [ -n "$API_CONTAINER" ]; then
              sudo docker exec "$API_CONTAINER" \
                wget -qO- --timeout=8 \
                --header="apikey: ${EVOLUTION_API_KEY}" \
                http://evolution-v2-evolution-api-1:8080/instance/fetchInstances 2>&1 \
                | python3 -c "import sys,json; d=json.load(sys.stdin); items=d if isinstance(d,list) else d.get('data',[]); [print('INSTANCE:',i.get('instance',{}).get('instanceName','?'),'state:',i.get('instance',{}).get('state','?')) for i in (items or [])] or print('(sin instancias)')" 2>/dev/null \
                || echo "(error al consultar instancias)"
            fi
          fi

          echo ""
          echo "=== Conectividad internet desde Evolution v2 (TCP WhatsApp) ==="
          if [ -n "$EVO_CONTAINER" ]; then
            sudo docker exec "$EVO_CONTAINER" node -e \
              "const net=require('net');const s=net.createConnection(443,'web.whatsapp.com');s.setTimeout(8000);s.on('connect',()=>{console.log('TCP OK: web.whatsapp.com:443');s.destroy()});s.on('error',e=>console.error('TCP ERROR:',e.code,e.message));s.on('timeout',()=>{console.log('TCP TIMEOUT');s.destroy()});" \
              2>&1 || echo "Node exec falló"
          fi

  diagnose-web:
    name: Diagnosticar conectividad web → API
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'diagnose-web'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Verificar business en API y conectividad desde web container
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          echo "=== 1. Verificar que dona-rosa existe en la DB (via API directo) ==="
          curl -sf http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io/public/business/dona-rosa \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('slug:', d.get('slug'), '| name:', d.get('name'))" \
            || echo "❌ API no devuelve dona-rosa"

          echo ""
          echo "=== 2. Containers corriendo ==="
          sudo docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -v "^NAMES" | head -20

          echo ""
          echo "=== 3. Encontrar web container ==="
          WEB_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=b10i6rz52rphphtcnxll73np" -q | head -1)
          if [ -z "$WEB_CONTAINER" ]; then
            WEB_CONTAINER=$(sudo docker ps --filter "name=b10i6rz52rphphtcnxll73np" -q | head -1)
          fi
          echo "Web container ID: $WEB_CONTAINER"
          if [ -n "$WEB_CONTAINER" ]; then
            echo "Web container name: $(sudo docker inspect $WEB_CONTAINER --format '{{.Name}}')"
            echo "Web container hostname: $(sudo docker inspect $WEB_CONTAINER --format '{{.Config.Hostname}}')"
            echo "Web container networks: $(sudo docker inspect $WEB_CONTAINER --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}')"
          fi

          echo ""
          echo "=== 4. Encontrar API container ==="
          API_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          if [ -z "$API_CONTAINER" ]; then
            API_CONTAINER=$(sudo docker ps --filter "name=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          fi
          echo "API container ID: $API_CONTAINER"
          if [ -n "$API_CONTAINER" ]; then
            echo "API container name: $(sudo docker inspect $API_CONTAINER --format '{{.Name}}')"
            echo "API container hostname: $(sudo docker inspect $API_CONTAINER --format '{{.Config.Hostname}}')"
            echo "API container networks: $(sudo docker inspect $API_CONTAINER --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}')"
            echo "API network aliases: $(sudo docker inspect $API_CONTAINER --format '{{range $k,$v := .NetworkSettings.Networks}}{{range $v.Aliases}}  {{.}} {{end}}{{end}}')"
          fi

          echo ""
          echo "=== 5. Test curl desde web container → API URL pública ==="
          if [ -n "$WEB_CONTAINER" ]; then
            sudo docker exec "$WEB_CONTAINER" \
              wget -qO- --timeout=5 http://h81lvlzrwjd7jf8bp0tkg1wa.2.24.201.108.sslip.io/public/business/dona-rosa \
              2>&1 || echo "❌ wget fallido (posible problema de red interna)"
          else
            echo "⚠️  web container no encontrado"
          fi

          echo ""
          echo "=== 6. Test curl desde web container → API hostname interno ==="
          if [ -n "$WEB_CONTAINER" ] && [ -n "$API_CONTAINER" ]; then
            API_HOSTNAME=$(sudo docker inspect "$API_CONTAINER" --format '{{.Config.Hostname}}')
            echo "Probando http://${API_HOSTNAME}:3000/public/business/dona-rosa ..."
            sudo docker exec "$WEB_CONTAINER" \
              wget -qO- --timeout=5 "http://${API_HOSTNAME}:3000/public/business/dona-rosa" \
              2>&1 || echo "❌ wget al hostname interno fallido"
          fi

          echo ""
          echo "=== 7. Últimas 20 líneas de logs del web container ==="
          if [ -n "$WEB_CONTAINER" ]; then
            sudo docker logs "$WEB_CONTAINER" --tail=20 2>&1 || true
          fi

          echo ""
          echo "=== 8. API_URL env var en web container ==="
          if [ -n "$WEB_CONTAINER" ]; then
            sudo docker inspect "$WEB_CONTAINER" --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -E 'API_URL|NEXT_PUBLIC' || echo "(no API_URL vars encontradas)"
          fi

          echo ""
          echo "=== 9. Test web app URL — /dona-rosa ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://b10i6rz52rphphtcnxll73np.2.24.201.108.sslip.io/dona-rosa)
          echo "HTTP status: ${HTTP_CODE}"
          echo "Primeras 300 chars de la respuesta HTML:"
          curl -s http://b10i6rz52rphphtcnxll73np.2.24.201.108.sslip.io/dona-rosa \
            | grep -o '<title>[^<]*\|Negocio no encontrado\|La Cocina\|dona-rosa\|menuColor\|PideFacil' | head -5 || echo "(sin coincidencias)"

          echo ""
          echo "=== 10. Node.js fetch test desde web container (simula Next.js server-side fetch) ==="
          if [ -n "$WEB_CONTAINER" ]; then
            sudo docker exec "$WEB_CONTAINER" node -e "
              const API_URL = process.env.API_URL ?? process.env.NEXT_PUBLIC_API_URL ?? 'http://localhost:3000';
              const url = API_URL + '/public/business/dona-rosa';
              console.log('process.env.API_URL:', process.env.API_URL);
              console.log('process.env.NEXT_PUBLIC_API_URL:', process.env.NEXT_PUBLIC_API_URL);
              console.log('Fetching URL:', url);
              fetch(url, { cache: 'no-store' })
                .then(r => { console.log('HTTP status:', r.status, r.statusText); return r.text(); })
                .then(body => console.log('Body (first 200 chars):', body.substring(0, 200)))
                .catch(e => console.error('FETCH ERROR:', e.message, e.cause?.message || '', e.cause?.code || ''));
            " 2>&1 || echo "❌ node -e failed"
          fi

          echo ""
          echo "=== 11. Verificar 'no-store' en código compilado ==="
          if [ -n "$WEB_CONTAINER" ]; then
            echo "Grep 'no-store' en .next/server/app:"
            sudo docker exec "$WEB_CONTAINER" grep -rl "no-store" /app/apps/web/.next/server/app/ 2>/dev/null | head -3 \
              || echo "  (no encontrado en /app/apps/web/.next/server/app/)"
            echo "Grep 'revalidate' en .next/server/app:"
            sudo docker exec "$WEB_CONTAINER" grep -rl "revalidate" /app/apps/web/.next/server/app/ 2>/dev/null | head -3 \
              || echo "  (no encontrado)"
            echo "API_URL en código compilado (chunks):"
            sudo docker exec "$WEB_CONTAINER" grep -r "API_URL\|localhost:3000" /app/apps/web/.next/server/ 2>/dev/null \
              | grep -v "Binary" | head -5 || echo "  (no encontrado)"
          fi

          echo ""
          echo "=== 12. Prerender manifest y archivos [slug] ==="
          if [ -n "$WEB_CONTAINER" ]; then
            echo "-- prerender-manifest.json (rutas pre-rendered) --"
            sudo docker exec "$WEB_CONTAINER" cat /app/apps/web/.next/prerender-manifest.json 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); routes=list(d.get('routes',{}).keys()); print('Pre-rendered routes:', routes[:10])" \
              || echo "  (no encontrado)"
            echo "-- Archivos en .next/server/app/[slug]/ --"
            sudo docker exec "$WEB_CONTAINER" ls -la '/app/apps/web/.next/server/app/[slug]/' 2>/dev/null || echo "  (directorio no encontrado)"
            echo "-- Archivos .html en .next/server/app/ --"
            sudo docker exec "$WEB_CONTAINER" find /app/apps/web/.next/server/app -name "*.html" 2>/dev/null | head -10 || echo "  (no hay archivos .html)"
          fi

  restart-evolution:
    name: Reiniciar Evolution API v2 (WhatsApp)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'restart-evolution'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Reiniciar contenedor Evolution v2
        run: |
          EVO_CONTAINER=$(sudo docker ps -a --filter "name=evolution-v2-evolution-api-1" -q | head -1)
          if [ -z "$EVO_CONTAINER" ]; then
            echo "❌ Contenedor evolution-v2-evolution-api-1 no encontrado"
            sudo docker ps -a --format "table {{.Names}}\t{{.Status}}" | grep -i evol || echo "(ningún contenedor evolution)"
            exit 1
          fi

          echo "Reiniciando $EVO_CONTAINER..."
          sudo docker restart "$EVO_CONTAINER"
          echo "Esperando 20s para que Evolution v2 arranque..."
          sleep 20

          echo "=== Estado después del restart ==="
          sudo docker ps --filter "name=evolution-v2" --format "table {{.Names}}\t{{.Status}}"

          echo ""
          echo "=== Últimos logs de Evolution v2 ==="
          sudo docker logs "$EVO_CONTAINER" --tail 30 2>&1

          echo ""
          echo "=== Test HTTP desde API container ==="
          API_CONTAINER=$(sudo docker ps --filter "label=coolify.applicationId=h81lvlzrwjd7jf8bp0tkg1wa" -q | head -1)
          if [ -n "$API_CONTAINER" ]; then
            sudo docker exec "$API_CONTAINER" \
              wget -qO- --timeout=5 http://evolution-v2-evolution-api-1:8080/ 2>&1 | head -3 \
              && echo "✅ Evolution v2 accesible desde API" \
              || echo "❌ Evolution v2 no responde"
          fi

