name: CI/CD — Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Integration Tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pidefacil_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Apply migrations on test DB
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/pidefacil_test
        run: npx prisma migrate deploy

      - name: Run API integration tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/pidefacil_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-minimum-32-characters-long-x
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-xx
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 30d
          NODE_ENV: test
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: pidefacil
        run: npx jest --testPathPattern=integration --testPathIgnorePatterns="files\\.integration" --runInBand --passWithNoTests

  deploy:
    name: Deploy to Coolify
    if: github.event_name == 'push'
    needs: test
    runs-on: [self-hosted, linux, deploy]
    steps:
      - name: Deploy API
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"h81lvlzrwjd7jf8bp0tkg1wa","force":false}'

      - name: Deploy Web
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"b10i6rz52rphphtcnxll73np","force":false}'

      - name: Deploy Admin
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"vh3jq4ik26i989m3xmlkrz20","force":false}'

  setup-whatsapp:
    name: Setup Evolution API (WhatsApp)
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Get PostgreSQL URL from Coolify
        id: get-db
        run: |
          ENVS=$(curl -sf 'http://localhost:8000/api/v1/applications/h81lvlzrwjd7jf8bp0tkg1wa/envs' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}')
          DB_URL=$(echo "$ENVS" | python3 -c "
          import sys, json
          envs = json.load(sys.stdin)
          for e in envs:
              if e.get('key') == 'DATABASE_URL':
                  print(e.get('value',''))
                  break
          ")
          echo "DB_URL=${DB_URL}" >> $GITHUB_OUTPUT
          echo "Got DATABASE_URL (masked)"

      - name: Create evolution_api database if not exists
        env:
          DB_URL: ${{ steps.get-db.outputs.DB_URL }}
        run: |
          python3 -c "
          import re, subprocess
          url = '${{ steps.get-db.outputs.DB_URL }}'
          m = re.match(r'postgresql://([^:]+):([^@]+)@([^:/]+)(?::(\d+))?/(\S+)', url)
          if not m:
              print('Could not parse DB URL')
              exit(1)
          user, pw, host, port, db = m.groups()
          port = port or '5432'
          admin_url = f'postgresql://{user}:{pw}@{host}:{port}/postgres'
          result = subprocess.run(
              ['psql', admin_url, '-c', 'CREATE DATABASE evolution_api;'],
              capture_output=True, text=True
          )
          if 'already exists' in result.stderr or result.returncode == 0:
              print('DB ready')
          else:
              print(result.stderr)
              exit(1)
          "

      - name: Start Evolution API
        env:
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          DB_URL: ${{ steps.get-db.outputs.DB_URL }}
        run: |
          cd apps/api
          EVO_DB_URL=$(echo "${DB_URL}" | sed 's|/[^/]*$|/evolution_api|')
          echo "--- Stopping any existing evolution-api container ---"
          sudo docker stop api-evolution-api-1 2>/dev/null || true
          sudo docker rm api-evolution-api-1 2>/dev/null || true
          printf "EVOLUTION_API_KEY=%s\nDATABASE_CONNECTION_URI=%s\n" "${EVOLUTION_API_KEY}" "${EVO_DB_URL}" > .env.whatsapp
          sudo docker compose -f docker-compose.whatsapp.yml --env-file .env.whatsapp pull
          sudo docker compose -f docker-compose.whatsapp.yml --env-file .env.whatsapp up -d
          rm -f .env.whatsapp
          echo "Waiting for Evolution API..."
          sleep 20
          curl -sf -H "apikey: ${EVOLUTION_API_KEY}" \
            http://localhost:18080/instance/fetchInstances \
            && echo "✅ Evolution API is up" \
            || (echo "❌ Evolution API failed to start" && sudo docker compose -f docker-compose.whatsapp.yml logs && exit 1)

      - name: Update API env vars in Coolify
        run: |
          curl -sf -X PATCH 'http://localhost:8000/api/v1/applications/h81lvlzrwjd7jf8bp0tkg1wa/envs/bulk' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "data": [
                {"key": "EVOLUTION_API_URL", "value": "http://localhost:18080", "is_preview": false},
                {"key": "EVOLUTION_API_KEY", "value": "${{ secrets.EVOLUTION_API_KEY }}", "is_preview": false}
              ]
            }' && echo "✅ Env vars updated"

      - name: Redeploy API
        run: |
          curl -sf -X POST 'http://localhost:8000/api/v1/deploy' \
            -H 'Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"uuid":"h81lvlzrwjd7jf8bp0tkg1wa","force":false}' \
            && echo "✅ API redeploy triggered"
