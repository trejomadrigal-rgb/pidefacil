name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (excluding mobile)
        run: pnpm build --filter=!@pidefacil/mobile

      - name: Run tests (excluding mobile)
        run: pnpm test --filter=!@pidefacil/mobile

      - name: Lint (excluding mobile)
        run: pnpm lint --filter=!@pidefacil/mobile
